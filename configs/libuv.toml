# Upstream package identity. Release tags supply the version as "<name>-<version>".
name = "libuv"
default_version = "1.52.1"

[source]
url = "https://dist.libuv.org/dist/v{version}/libuv-v{version}.tar.gz"
# Optional fallback checksum. Prefer [source.sha256_by_version] for pinned releases.
sha256 = ""

[source.sha256_by_version]
# Add entries as versions are promoted, for example:
# "1.48.0" = "..."

[termux]
package = "libuv"
# Pin this to a Termux commit once patches are needed for deterministic rebuilds.
ref = "master"
patches = ["src-unix-fs.c.patch", "src-unix-linux.c.patch"]

[build]
system = "cmake"
source_subdir = "."

[build.defines]
BUILD_SHARED_LIBS = "OFF"
BUILD_TESTING = "OFF"
CMAKE_POSITION_INDEPENDENT_CODE = "ON"
LIBUV_BUILD_SHARED = "OFF"
LIBUV_BUILD_TESTS = "OFF"
